name: Deploy GitHub Pages via gh-pages branch

# 觸發條件
# 1. push to main branch（docs/ 有變更時自動 deploy）
# 2. workflow_dispatch（手動 trigger，從 Actions tab 點按鈕）
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# 必要權限
# - contents: write（git push 到 gh-pages branch）
# - deployments: read（verify step 查 status）
# - statuses: read（備用）
permissions:
  contents: write
  deployments: read
  statuses: read

# Concurrency control：避免多次 push 同時跑多個 deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Push docs/ to gh-pages branch + verify
    runs-on: ubuntu-latest

    steps:
      # 1. checkout repo（含完整 history 才能用 git subtree push）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整 history

      # 2. Setup git config（subtree push 需要 user.name / user.email）
      - name: Setup git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 3. Push docs/ 到 gh-pages branch（用 git subtree split + push）
      # 跟之前 publish.sh 的 subtree push 邏輯一樣，但用 gh-pages branch 直接 deploy
      # 優點：Pages 從 branch source 直接 serve，不經 Pages deployment API
      # 缺點：subtree push 失敗沒 retry 機制
      - name: Push docs/ to gh-pages branch
        id: push
        run: |
          git subtree push --prefix=docs origin gh-pages
          echo "✓ docs/ pushed to gh-pages branch"

      # 4. Verify 步驟
      # - 等 30 秒讓 Pages 從 gh-pages branch build + serve
      # - fetch 網站確認 HTTP 200
      # - fetch data/video-notes.json 確認內容 OK
      # - 全部 OK 才算 success，否則 fail
      - name: Verify site reachable + data OK
        uses: actions/github-script@v7
        timeout-minutes: 8
        with:
          script: |
            const SITE = 'https://travisebill.github.io/video-notes/';
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

            // --- A. 等 30 秒讓 Pages build gh-pages branch + 同步 CDN ---
            core.info('[verify] waiting 30s for Pages to build gh-pages branch...');
            await sleep(30000);

            // --- B. fetch 網站確認 HTTP 200 ---
            core.info(`[verify] GET ${SITE}`);
            const resp = await fetch(SITE, { redirect: 'manual' });
            const status = resp.status;
            core.info(`[verify] site HTTP ${status}`);
            if (status < 200 || status >= 400) {
              core.setFailed(`[verify] ❌ ${SITE} HTTP ${status}（subtree push 完成但網站打不開）`);
              return;
            }

            // --- C. fetch data/video-notes.json 確認內容 OK ---
            const dataUrl = SITE + 'data/video-notes.json';
            core.info(`[verify] GET ${dataUrl}`);
            const dataResp = await fetch(dataUrl);
            if (!dataResp.ok) {
              core.setFailed(`[verify] ❌ ${dataUrl} HTTP ${dataResp.status}`);
              return;
            }
            const data = await dataResp.json();
            const videoCount = data.videos?.length || 0;
            core.info(`[verify] data/video-notes.json OK（${videoCount} 支影片）`);

            // --- D. 額外驗證：確認 Lecture 1-26 順序正確（用 lec_num）---
            const cs224 = (data.videos || []).filter((v) => 'CS224' in (v.id || '') || 'JelaniNelson' in (v.id || '') || 'PiotrIndyk' in (v.id || ''));
            const lecNums = cs224.map((v) => v.lec_num).filter((n) => n != null).sort((a, b) => a - b);
            const lecNumStr = lecNums.join(',');
            core.info(`[verify] CS224 lec_num 順序: [${lecNumStr}]`);
            if (lecNums.length !== 26) {
              core.setFailed(`[verify] ❌ CS224 預期 26 支但只有 ${lecNums.length} 支有 lec_num`);
              return;
            }

            // --- E. 全部 OK ---
            core.info(`[verify] ✅ ${SITE} HTTP 200 + data ${videoCount} 支 + CS224 lec_num 1-26 順序正確`);
            core.summary.addRaw(
                `# GitHub Pages Deployment Verified ✅\n\n` +
                `- Site: ${SITE}\n` +
                `- HTTP Status: ${status}\n` +
                `- Videos: ${videoCount}\n` +
                `- CS224 順序: [${lecNumStr}]\n` +
                `- Method: git subtree push --prefix=docs origin gh-pages\n`
            ).write();