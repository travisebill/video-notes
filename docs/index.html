<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Notes — 影片摘要與口說音檔</title>
  <meta name="description" content="結構化影片筆記 + TTS 口說音檔瀏覽器。支援按類別、講者、主題、日期篩選 + 全文搜尋 + 章節時間戳跳 YouTube。">

  <!-- PWA manifest + theme -->
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#1095c1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VideoNotes">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="./icons/favicon-64.png">
  <link rel="icon" type="image/png" sizes="128x128" href="./icons/favicon-128.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png">

  <!-- Pico.css classless CSS（含 light/dark mode） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

  <!-- 客製樣式 -->
  <link rel="stylesheet" href="style.css">

  <!-- Alpine.js 響應式 + 篩選 -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

  <!-- Fuse.js fuzzy search -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>

  <!-- marked.js markdown 渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

  <!-- DOMPurify XSS 防護 -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
</head>
<body>
  <main class="container" x-data="videoApp" x-init="init()">
    <!-- Phase 3 P3-T2: SW + SEED init banner — visible during 'registering_sw' / 'seeding' / 'error' -->
    <div x-show="initProgress !== 'idle' && initProgress !== 'done'"
         class="seed-banner"
         :data-state="initProgress"
         :data-attempt="initAttempt"
         x-transition.opacity.duration.300ms
         style="background:#fef3c7;border-left:4px solid #f59e0b;padding:12px 16px;margin:8px auto;max-width:1280px;display:flex;align-items:center;gap:12px;border-radius:4px;">
      <span x-text="getInitMessage()" style="flex:1;font-size:14px;color:#78350f;font-weight:500;"></span>
      <button x-show="seedError"
              @click="retrySeed()"
              type="button"
              style="background:#f59e0b;color:white;padding:6px 14px;border-radius:4px;border:none;cursor:pointer;font-size:13px;font-weight:600;">
        🔄 重試
      </button>
    </div>
    <!-- Phase 3 P3-T4: Offline Banner (red, shown when navigator.onLine === false) -->
    <div x-show="!navigatorOnline"
         class="offline-banner"
         x-cloak
         x-transition.opacity.duration.200ms
         style="background:#fee2e2;border-left:4px solid #dc2626;padding:12px 16px;margin:8px auto;max-width:1280px;border-radius:4px;color:#7f1d1d;font-size:14px;font-weight:500;">
      ⚠️ 你目前離線 — 部分功能可能受限（列表 / 結構化筆記 / 縮圖可用；逐字稿 / 口播稿 / 音檔需網路）
    </div>
    <!-- Phase 4 P4-T6: AUTO_CACHE_DONE notification banner (green, 24h-deduped via P2-T4 should_notify) -->
    <div x-show="autoCacheBanner"
         class="auto-cache-banner"
         x-cloak
         x-transition.opacity.duration.300ms
         @click="dismissAutoCacheBanner()"
         title="點擊關閉 (8s 自動消失)"
         style="background:#d1fae5;border-left:4px solid #10b981;padding:12px 16px;margin:8px auto;max-width:1280px;border-radius:4px;color:#065f46;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:12px;">
      <span x-text="autoCacheBanner?.message" style="flex:1;"></span>
      <span style="font-size:11px;opacity:0.7;">（8s 自動關閉，點擊立即關閉）</span>
    </div>
    <!-- Header -->
    <header>
      <hgroup>
        <h1>🎬 Video Notes</h1>
        <p>
          <small x-text="meta.total_videos + ' 支影片 · ' + meta.speakers_count + ' 位講者 · ' + meta.topics_count +' 個主題'"></small>
          <small x-show="meta.last_updated">
            ｜ 最後更新 <time x-text="meta.last_updated.substring(0, 10)"></time>
          </small>
        </p>
      </hgroup>
      <button @click="toggleTheme()" class="secondary outline" style="float:right; margin-top:-3rem;">
        <span x-text="theme === 'dark' ? '☀️ Light' : '🌙 Dark'"></span>
      </button>
    </header>

    <!-- Search Bar -->
    <section>
      <input type="search" placeholder="🔍 搜尋標題、講者、主題（支援 fuzzy search）..."
             x-model="searchQuery" @input="applyFilters()">
    </section>

    <!-- Filter Grid -->
    <section class="filter-grid">
      <!-- Category -->
      <label>
        <small>類別</small>
        <select x-model="filters.category" @change="applyFilters()">
          <option value="">全部類別</option>
          <template x-for="c in meta.categories" :key="c">
            <option :value="c" x-text="c"></option>
          </template>
        </select>
      </label>

      <!-- Speaker -->
      <label>
        <small>講者</small>
        <select x-model="filters.speaker" @change="applyFilters()">
          <option value="">全部講者</option>
          <template x-for="s in sortedSpeakers" :key="s">
            <option :value="s" x-text="s"></option>
          </template>
        </select>
      </label>

      <!-- Topic -->
      <label>
        <small>主題</small>
        <select x-model="filters.topic" @change="applyFilters()">
          <option value="">全部主題</option>
          <template x-for="t in sortedTopics" :key="t">
            <option :value="t" x-text="cleanTopic(t)"></option>
          </template>
        </select>
      </label>

      <!-- Date Range -->
      <label>
        <small>日期範圍</small>
        <select x-model="filters.dateRange" @change="applyFilters()">
          <option value="all">全部時間</option>
          <option value="30d">最近 30 天</option>
          <option value="90d">最近 90 天</option>
          <option value="6m">最近 6 個月</option>
          <option value="1y">最近 1 年</option>
        </select>
      </label>

      <!-- v1.8 2026-07-14: 無影片篩選 (filter for missing video_url) -->
      <label>
        <small>影片連結</small>
        <select x-model="filters.linkStatus" @change="applyFilters()">
          <option value="all">全部</option>
          <option value="with_link">✓ 有 YouTube 連結</option>
          <option value="no_link">⚠️ 無 YouTube 連結</option>
        </select>
      </label>

      <!-- Course (B3 scheme 2026-07-05) -->
      <label x-show="meta.courses && meta.courses.length > 0">
        <small>課程</small>
        <select x-model="filters.course" @change="onCourseChange()">
          <option value="">全部課程</option>
          <template x-for="c in meta.courses" :key="c">
            <option :value="c" x-text="c"></option>
          </template>
        </select>
      </label>
    </section>

    <!-- Stats Bar -->
    <p>
      <small>
        <strong x-text="filteredVideos.length"></strong> / <span x-text="meta.total_videos"></span> 支影片
        ｜ 排序：
        <button @click="setSort('date_desc')" :class="sort === 'date_desc' ? '' : 'secondary outline'" style="padding:0.2rem 0.5rem; font-size:0.8rem;">最新優先</button>
        <button @click="setSort('date_asc')" :class="sort === 'date_asc' ? '' : 'secondary outline'" style="padding:0.2rem 0.5rem; font-size:0.8rem;">最舊優先</button>
        <button @click="setSort('lec_num_asc')" :class="sort === 'lec_num_asc' ? '' : 'secondary outline'" style="padding:0.2rem 0.5rem; font-size:0.8rem;">Lecture 編號</button>
        <button @click="setSort('duration_desc')" :class="sort === 'duration_desc' ? '' : 'secondary outline'" style="padding:0.2rem 0.5rem; font-size:0.8rem;">最長優先</button>
        <button @click="setSort('duration_asc')" :class="sort === 'duration_asc' ? '' : 'secondary outline'" style="padding:0.2rem 0.5rem; font-size:0.8rem;">最短優先</button>
      </small>
    </p>

    <!-- Video Grid -->
    <div class="video-grid" x-show="filteredVideos.length > 0">
      <template x-for="video in filteredVideos" :key="video.id">
        <article class="video-card">
          <!-- Thumbnail: YouTube when video_url, otherwise inline SVG placeholder (v1.7.1 2026-07-14) -->
          <!-- 用 <template x-if> 而非 x-show，避免 CSS display: block !important 蓋掉 inline display: none -->
          <div class="video-thumbnail-wrap">
            <template x-if="video.video_url">
              <a :href="video.video_url"
                 target="_blank"
                 class="video-thumbnail-link"
                 :aria-label="'在 YouTube 開啟：' + video.title">
                <img class="video-thumbnail"
                     :src="thumbnailUrl(video)"
                     :alt="video.title"
                     loading="lazy"
                     @error="onThumbnailError($event, video)">
                <span class="video-thumbnail-play" aria-hidden="true">▶</span>
              </a>
            </template>
            <template x-if="!video.video_url">
              <div class="video-thumbnail-link no-thumbnail"
                   :aria-label="'此筆記尚未補 YouTube 連結：' + video.title">
                <img class="video-thumbnail"
                     :src="thumbnailUrl(video)"
                     :alt="video.title">
                <span class="no-thumbnail-badge">無影片</span>
              </div>
            </template>
          </div>

          <!-- Header -->
          <header>
            <div style="display:flex; justify-content:space-between; align-items:start; gap:0.5rem;">
              <h4 style="margin:0;" x-text="video.title"></h4>
              <span class="duration-badge" x-show="video.duration_display" x-text="video.duration_display"></span>
            </div>
            <p>
              <small x-show="video.course_slug">
                <span class="course-badge" x-text="video.course_slug"></span>
              </small>
              <span x-show="video.course_slug && video.lec_num"> ｜ Lecture <strong x-text="video.lec_num"></strong></span>
            </p>
            <p>
              <small>
                🎤 <span x-html="formatSpeaker(video.speaker_slug, video.speaker, video.speaker_description)"></span>
                ｜ 📅 <time x-text="video.date"></time>
                ｜ 📂 <span x-text="video.category"></span>
              </small>
              <br>
              <small x-show="video.primary_topic">
                🏷️ <span x-text="cleanTopic(video.primary_topic)"></span>
              </small>
              <small x-show="!video.primary_topic" style="color:var(--pico-muted-color);">
                🏷️ <em>未分類</em>
              </small>
            </p>
          </header>

          <!-- Audio Player -->
          <div x-show="video.audio.m4a" class="audio-player">
            <small>🎙️ 口說音檔（m4a）：</small>
            <audio controls preload="none" :src="getAudioUrl(video, 'm4a')" style="width:100%;"></audio>
            <small x-show="video.audio.opus || video.audio.mp3" style="display:block; margin-top:0.3rem;">
              <span x-show="video.audio.opus">
                <a :href="getAudioUrl(video, 'opus')" download>opus</a>
              </span>
              <span x-show="video.audio.m4a && video.audio.mp3">｜</span>
              <span x-show="video.audio.mp3">
                <a :href="getAudioUrl(video, 'mp3')" download>mp3</a>
              </span>
            </small>
          </div>

          <!-- Actions -->
          <footer>
            <button @click="toggleExpand(video.id)" class="secondary outline" style="padding:0.3rem 0.7rem; font-size:0.85rem;" x-text="expanded[video.id] ? '🔼 收合內容' : '📖 展開內容'"></button>
            <a :href="video.note_github_url" target="_blank" role="button" class="secondary outline" style="padding:0.3rem 0.7rem; font-size:0.85rem;" title="在 GitHub 開啟原始 markdown">🔗 GitHub</a>
            <a x-show="video.video_url" :href="video.video_url" target="_blank" role="button" class="secondary outline" style="padding:0.3rem 0.7rem; font-size:0.85rem;">▶️ YouTube</a>
          </footer>

          <!-- Inline Expand Panel (mobile: inline, tablet/desktop: fullscreen modal via CSS) -->
          <div x-show="expanded[video.id]" class="expand-panel" @click.self="closeExpand(video.id)">
            <div class="expand-content" :class="videoCollapsed[video.id] ? 'video-collapsed' : ''">
              <!-- Topbar (sticky on tablet/desktop) -->
              <div class="expand-topbar">
                <button @click="closeExpand(video.id)" class="close-btn" aria-label="關閉">✕</button>
                <h3 class="expand-title" x-text="video.title"></h3>
                <button x-show="getYouTubeEmbedUrl(video) && !videoCollapsed[video.id]"
                        @click="toggleCollapse(video.id)"
                        class="secondary outline collapse-btn"
                        aria-label="收合影片"
                        title="收合影片，騰出更多空間給筆記">📹 收合影片</button>
                <button x-show="getYouTubeEmbedUrl(video) && videoCollapsed[video.id]"
                        @click="toggleCollapse(video.id)"
                        class="secondary outline collapse-btn"
                        aria-label="展開影片"
                        title="展開影片">📹 展開影片</button>
              </div>

              <!-- YouTube embed (左欄 / 平板 sticky top) -->
              <div x-show="getYouTubeEmbedUrl(video)"
                   class="youtube-embed"
                   :class="videoCollapsed[video.id] ? 'collapsed' : ''">
                <iframe :id="'youtube-iframe-' + video.id"
                        :src="expanded[video.id] ? getYouTubeEmbedUrl(video) : ''"
                        allowfullscreen
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        frameborder="0"
                        referrerpolicy="strict-origin-when-cross-origin"
                        loading="lazy">
                </iframe>
              </div>

              <!-- Right pane (右欄 / 手機全寬) — 包住 tabs + content -->
              <div class="right-pane">
                <!-- Tabs -->
                <div class="tabs">
                  <button @click="switchTab(video.id, 'note')" :class="getTabClass(video.id, 'note')" x-show="video.note_path">📄 結構化筆記</button>
                  <button @click="switchTab(video.id, 'transcript')" :class="getTabClass(video.id, 'transcript')" x-show="video.transcripts.transcript">📝 逐字稿</button>
                  <button @click="switchTab(video.id, 'spoken')" :class="getTabClass(video.id, 'spoken')" x-show="video.transcripts.spoken_script">🎙️ 口播稿</button>
                </div>

                <!-- Loading -->
                <div x-show="loadingContent[video.id]" style="padding:1rem; text-align:center;">
                  <small>⏳ 載入中...</small>
                </div>

                <!-- Note content (markdown) -->
                <div x-show="!loadingContent[video.id] && activeTabs[video.id] === 'note'" class="content-area markdown-body" :data-video="video.id" :data-yt-id="video.yt_id" x-html="renderedContent[video.id + '_note']"></div>

                <!-- Transcript content (plain text) -->
                <div x-show="!loadingContent[video.id] && activeTabs[video.id] === 'transcript'" class="content-area transcript-body">
                  <pre x-text="contentCache[video.id + '_transcript']"></pre>
                </div>

                <!-- Spoken content (plain text) -->
                <div x-show="!loadingContent[video.id] && activeTabs[video.id] === 'spoken'" class="content-area spoken-body">
                  <pre x-text="contentCache[video.id + '_spoken']"></pre>
                </div>

                <!-- Empty state -->
                <div x-show="!loadingContent[video.id] && !hasContent(video.id, activeTabs[video.id])" style="padding:1rem; text-align:center; color:var(--pico-muted-color);">
                  <small>此類型沒有可用內容</small>
                </div>
              </div>
            </div>
          </div>
        </article>
      </template>
    </div>

    <!-- Empty State -->
    <article x-show="filteredVideos.length === 0">
      <p>🔍 沒有符合條件的影片。</p>
      <button @click="resetFilters()" class="secondary outline">清除篩選</button>
    </article>

    <!-- Footer -->
    <footer>
      <small>
        由 Ryo 🐱 自動整理 · 共 <span x-text="meta.total_videos"></span> 支影片 ·
        <a href="https://github.com/travisebill/video-notes" target="_blank">GitHub Repo</a>
      </small>
    </footer>
  </main>

  <!-- App Logic -->
  <script src="app.js"></script>
</body>
</html>
